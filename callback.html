<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in...</title>
    <script src="js/auth.js"></script>
    <script>
        // Initialize auth (captures token from URL if present)
        initAuth();
        
        // If we have a token, go to dashboard
        if (isAuthenticated()) {
            window.location.href = '/dashboard.html';
        } else {
            // No token, go back to login
            window.location.href = '/index.html?error=no_token';
        }
    </script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Logging you in...</h2>
        <p>Please wait while we complete authentication.</p>
    </div>
    
    <!-- NOTE: Backend handles the OAuth code exchange at /callback.html?code=...
         The backend will redirect us to /dashboard.html?access_token=... with the token.
         This frontend callback.html is just a loading screen. -->
</body>
</html>
