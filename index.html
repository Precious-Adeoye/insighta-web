<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insighta Labs+ - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .github-btn {
            background: #24292e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .github-btn:hover {
            background: #1a1e22;
            transform: translateY(-2px);
        }

        .features {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .feature {
            color: #666;
            font-size: 0.8rem;
        }

        .error-message {
            color: #dc2626;
            margin-top: 1rem;
            padding: 0.5rem;
            background: #fee2e2;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔍 Insighta Labs+</h1>
        <p class="subtitle">Demographic Intelligence Platform</p>
        
        <a href="#" id="loginBtn" class="github-btn">
            <svg height="22" width="22" viewBox="0 0 16 16" fill="white">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Login with GitHub
        </a>
        
        <div class="features">
            <span class="feature">📊 Advanced Filtering</span>
            <span class="feature">🔍 Natural Language Search</span>
            <span class="feature">📁 CSV Export</span>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
    // Check if already logged in
    if (isAuthenticated()) {
        window.location.href = '/dashboard.html';
    }
    
    // Login button
    document.getElementById('loginBtn')?.addEventListener('click', login);
</script>
    <script>
         // Store the return URL after login
        const returnUrl = window.location.pathname;
        const loginUrl = `${API_BASE_URL}/api/auth/github-login?returnUrl=${encodeURIComponent(returnUrl)}`;
        document.getElementById('loginBtn').href = loginUrl;

        // Check for error in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('errorMessage');
            if (error === 'login_failed') {
                errorDiv.textContent = 'Login failed. Please try again.';
            } else if (error === 'no_code') {
                errorDiv.textContent = 'No authorization code received.';
            }
            errorDiv.style.display = 'block';
        }
        
        // Set login button URL
        document.getElementById('loginBtn').href = `${API_BASE_URL}/api/auth/github-login`;
    </script>
</body>
</html>
